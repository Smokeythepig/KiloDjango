{% extends 'skillsswap/base.html' %}
{% block content %}
<h2>Create Account</h2>

<form method="post">
    {% csrf_token %}
    {% for field in form %}
    <div style="margin-bottom: 12px;">
        {{ field.label_tag }}<br>
        {{ field }}
        {% if field.errors %}
        <div style="color: red;">{{ field.errors|striptags }}</div>
        {% endif %}
    </div>
    {% endfor %}
    <button type="submit" style="padding: 8px 16px; background: #5cb85c; color: white; border: none; border-radius: 4px;">Register</button>
</form>

<p style="margin-top: 15px;">Already have an account? <a href="{% url 'login' %}">Log in</a></p>
{% endblock %}
