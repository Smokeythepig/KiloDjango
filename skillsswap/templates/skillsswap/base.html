<!DOCTYPE html>
<html>

<head>
    <title>Kilo Expense Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        nav {
            margin-bottom: 20px;
            padding: 10px;
            background: #333;
            color: white;
            border-radius: 4px;
        }

        nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
        }

        .errorlist {
            color: #d9534f;
            list-style: none;
            padding: 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <nav>
            <strong>Kilo Tracker</strong> |
            <a href="{% url 'expense_list' %}">All Expenses</a> |
            <a href="{% url 'expense_add' %}">Add New</a>
        </nav>
        {% block content %}{% endblock %}
    </div>
</body>

</html>
