{% extends 'skillsswp/base.html' %}
{% block content %}
<h2>{% if object %}Edit{% else %}Add{% endif %} Expense</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }} <button type="submit"
        style="padding: 10px 20px; background: #5cb85c; color: white; border: none; border-radius: 4px;">
        Save Expense
    </button>
</form>
<p><a href="{% url 'expense_list' %}">Back to List</a></p>
{% endblock %}
