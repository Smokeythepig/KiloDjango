{% extends 'skillsswap/base.html' %}
{% block content %}
<h2>Confirm Deletion</h2>
<p>Are you sure you want to delete the record for <strong>{{ object.category }} (${{ object.amount }})</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" style="background: #d9534f; color: white; border: none; padding: 10px;">Confirm
        Delete</button>
    <a href="{% url 'expense_list' %}">Cancel</a>
</form>
{% endblock %}
